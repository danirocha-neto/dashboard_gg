name: Atualizar Dashboard Gente & Gestão

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Buscar dados do Google Sheets e atualizar dashboard
        run: node update-dashboard.js

      - name: Commitar e publicar dashboard atualizado
        run: |
          git config --global user.name "Dashboard Bot"
          git config --global user.email "bot@github-actions"
          git add .
          git diff --staged --quiet || git commit -m "🔄 Dashboard atualizado - $(date -u '+%d/%m/%Y %H:%M') UTC"
          git push
